<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhishLens</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">PhishLens</p>
        <h1>Browser security copilot</h1>
        <p class="subtle">Scan the current site, save your JWT token, and request deep analysis when needed.</p>
      </header>

      <section class="panel settings">
        <div class="field">
          <label for="backendUrl">Backend URL</label>
          <input id="backendUrl" type="url" placeholder="http://localhost:8000" />
        </div>
        <div class="field">
          <label for="authToken">JWT token</label>
          <input id="authToken" type="password" placeholder="Paste token from dashboard" />
        </div>
        <div class="actions">
          <button id="saveSettings" class="secondary">Save settings</button>
          <button id="openDashboard" class="ghost">Open dashboard</button>
        </div>
      </section>

      <section class="score-card">
        <div>
          <p class="label">Risk score</p>
          <strong id="riskScore">--</strong>
        </div>
        <span class="badge" id="classification">Waiting</span>
      </section>

      <section class="panel">
        <button id="scanButton">Scan active tab</button>
        <button id="deepButton" class="secondary">Deep Analysis</button>
        <div id="status" class="status">Ready to analyze the current page.</div>
      </section>

      <section class="panel">
        <h2>Why this matters</h2>
        <p id="explanation" class="status">No scan has been run yet.</p>
        <ul id="issues"></ul>
      </section>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
